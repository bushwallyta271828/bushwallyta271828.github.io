---
layout: default
title: Writing
---

<section>
    <h2>Writing</h2>

    <ul class="post-list">
        {% for post in site.posts %}
        <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a><span class="post-list-date">{{ post.date | date: "%B %-d, %Y" }}</span></li>
        {% else %}
        <li>No posts yet.</li>
        {% endfor %}
    </ul>
</section>
