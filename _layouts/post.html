---
layout: default
---

<article class="post">
    <header class="post-header">
        <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
        <h2>{{ page.title }}</h2>
        {% if page.description %}
        <p class="post-description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>
