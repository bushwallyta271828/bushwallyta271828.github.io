<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% if page.math %}
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    {% endif %}
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-inner">
                <a class="profile-photo" href="{{ '/' | relative_url }}" aria-label="Alexander Heckett home" style="background-image: url('{{ '/photo.jpg' | relative_url }}');"></a>
                <div class="sidebar-text">
                    <h1>Alexander Heckett</h1>
                </div>
                <nav>
                    <ul>
                        <li><a class="{% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">About</a></li>
                        <li><a class="{% if page.url contains '/interests' %}active{% endif %}" href="{{ '/interests/' | relative_url }}">Interests</a></li>
                        <li><a class="{% if page.url contains '/blog' or page.url contains '/notes' %}active{% endif %}" href="{{ '/blog/' | relative_url }}">Blog</a></li>
                    </ul>
                </nav>
            </div>
        </aside>

        <main>
            <div class="main-inner">
                {{ content }}
            </div>
        </main>
    </div>
</body>
</html>
